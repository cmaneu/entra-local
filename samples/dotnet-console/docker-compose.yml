services:
  emulator:
    image: ghcr.io/cmaneu/entra-local:latest
    container_name: entra-local-emulator
    ports:
      - "8443:8443"   # HTTPS authority/token/graph endpoints
      - "5173:5173"   # Admin portal
    environment:
      # Use container hostname for internal communication
      PUBLIC_ORIGIN: "https://emulator:8443"
      # Disable password requirement for seeded users (dev-only)
      REQUIRE_PASSWORD: "false"
    volumes:
      # Persist emulator state and share cert with console app
      - emulator-data:/data
      - emulator-cert:/cert
    networks:
      - entra-net

  console:
    build: .
    container_name: dotnet-console-sample
    depends_on:
      - emulator
    environment:
      # Point to emulator service on the shared network (DNS resolution via Docker)
      EMULATOR_ORIGIN: "https://emulator:8443"
      TENANT_ID: "11111111-1111-1111-1111-111111111111"
      CLIENT_ID: "cccccccc-0000-0000-0000-000000000001"
      API_SCOPE: "https://graph.microsoft.com/.default"
      # Use smoke mode in Docker (no browser needed, automated verification)
      ENABLE_SMOKE: "true"
      # Cert path shared with emulator
      EMULATOR_CERT: "/cert/emulator-cert.pem"
    volumes:
      # Mount shared cert volume
      - emulator-cert:/cert
    networks:
      - entra-net
    # Smoke mode runs once and exits, don't restart
    restart: "no"

volumes:
  emulator-data:
    driver: local
  emulator-cert:
    driver: local

networks:
  entra-net:
    driver: bridge

