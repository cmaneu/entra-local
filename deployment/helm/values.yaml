replicaCount: 1

image:
  repository: ghcr.io/cmaneu/entra-local
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8443
  targetPort: 8443

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: entra-local.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

env: []

nodeSelector: {}
tolerations: []
affinity: {}

readinessProbe:
  httpGet:
    path: /health
    port: https
    scheme: HTTPS
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: https
    scheme: HTTPS
  initialDelaySeconds: 20
  periodSeconds: 20
