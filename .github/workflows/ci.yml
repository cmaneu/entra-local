name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TENANT_ID: '11111111-1111-1111-1111-111111111111'
    strategy:
      matrix:
        # Node 24 is the primary target; 22.13 asserts the node:sqlite floor (#2) — the first
        # release where the built-in `node:sqlite` module is available without the
        # `--experimental-sqlite` flag (added flagged in 22.5, unflagged in 22.13).
        node-version: ['24', '22.13']
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Unit + integration tests
        run: pnpm test

      # Playwright browser is required by the e2e browser drivers once #6 lands;
      # cached here so the e2e job stays fast. Browser launch is gated behind
      # E2E_BROWSER until then, so the #1 e2e suite passes without it.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # MSAL cross-platform smoke-tests (#13) run inside `npm run test:e2e` as child processes.
      # Provision the .NET SDK and Python + the MSAL packages so they execute (rather than skip)
      # in CI. Pin Python 3.12 (a version with a published `msal` wheel) regardless of the local
      # toolchain. Instance discovery is disabled in every client, so the suite stays offline.
      - name: Set up .NET SDK (MSAL.NET smoke-test)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Python (MSAL Python smoke-test)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MSAL Python + JWT validation packages
        run: python -m pip install --upgrade pip msal pyjwt cryptography requests

      - name: End-to-end (real-MSAL) tests
        run: pnpm run test:e2e

  # Full-stack SPA + API sample (#24): build the emulator, boot all three tiers (emulator + Express
  # API + Vite-preview SPA), then run the Playwright smoke that drives a real `@azure/msal-browser`
  # sign-in and asserts the happy path (200, aud=API app, scp contains access_as_user) plus the
  # 401 (no/garbage token) and 403 (valid token, wrong scope) negative paths. Also asserts the
  # sample README is present (documentation acceptance criterion).
  samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install emulator dependencies
        run: pnpm install --frozen-lockfile

      - name: Build emulator
        run: pnpm run build

      - name: Start emulator (seeded, TLS) on :8443
        run: |
          nohup pnpm start > emulator.log 2>&1 &
          echo "EMULATOR_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -ksS https://localhost:8443/health | grep -q '"status":"ok"'; then
              echo "emulator healthy"; exit 0
            fi
            sleep 2
          done
          echo "emulator did not become healthy"; cat emulator.log; exit 1

      - name: Build & start the sample API on :4000
        working-directory: samples/fullstack-spa-api/api
        env:
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/data/tls/cert.pem
        run: |
          npm ci
          nohup npm start > api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sS http://localhost:4000/health | grep -q '"status":"ok"'; then
              echo "api healthy"; exit 0
            fi
            sleep 2
          done
          echo "api did not become healthy"; cat api.log; exit 1

      - name: Build & start the sample SPA on :5173
        working-directory: samples/fullstack-spa-api/spa
        run: |
          npm ci
          npm run build
          nohup npm run preview > spa.log 2>&1 &
          echo "SPA_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sS http://localhost:5173/ | grep -q '<title>'; then
              echo "spa up"; exit 0
            fi
            sleep 2
          done
          echo "spa did not start"; cat spa.log; exit 1

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run the full-stack smoke (200 / 401 / 403)
        run: node samples/fullstack-spa-api/smoke.mjs

      - name: Tear down background services
        if: always()
        run: kill "$EMULATOR_PID" "$API_PID" "$SPA_PID" 2>/dev/null || true

  # Node CLI device-code sample (#19, node-cli): build + start the emulator, then run the headless
  # device-code smoke. The smoke spawns the real CLI (`tsx src/cli.ts`), reads the user code it
  # prints, approves it as the seeded user Alice via the emulator's approval endpoint, and asserts
  # the CLI minted a Graph-audience token (scp ⊇ User.Read) and that GET /graph/v1.0/me returned
  # Alice's profile. Also asserts the sample README is present (documentation acceptance criterion).
  node-cli-sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install emulator dependencies
        run: pnpm install --frozen-lockfile

      - name: Build emulator
        run: pnpm run build

      - name: Start emulator (seeded, TLS) on :8443
        run: |
          nohup pnpm start > emulator.log 2>&1 &
          echo "EMULATOR_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -ksS https://localhost:8443/health | grep -q '"status":"ok"'; then
              echo "emulator healthy"; exit 0
            fi
            sleep 2
          done
          echo "emulator did not become healthy"; cat emulator.log; exit 1

      - name: Install sample dependencies
        working-directory: samples/node-cli
        run: npm ci

      - name: Assert the sample README is present
        run: test -f samples/node-cli/README.md

      - name: Run the device-code smoke (headless approval)
        env:
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/data/tls/cert.pem
        run: node samples/node-cli/smoke.mjs

      - name: Tear down background services
        if: always()
        run: kill "$EMULATOR_PID" 2>/dev/null || true

  # Run-targets (#14): prove the hardened image actually builds, runs as the published port is
  # reachable from the HOST (HOST=0.0.0.0), the HEALTHCHECK goes healthy, env passthrough works,
  # and the data volume persists the DB + auto-generated cert across a stop/start. Maps to
  # acceptance criteria 3/4/5/6/7/9.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t entra-local:ci .

      - name: Run container (fresh named volume)
        run: |
          docker run -d --name el-ci -p 8443:8443 -v el-ci-data:/app/data entra-local:ci

      - name: Wait for the container HEALTHCHECK to report healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' el-ci)
            echo "health: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            if [ "$status" = "unhealthy" ]; then docker logs el-ci; exit 1; fi
            sleep 2
          done
          echo "container did not become healthy in time"; docker logs el-ci; exit 1

      - name: Host /health is reachable over the mapped port (proves HOST=0.0.0.0) and returns 200 ok
        run: |
          body=$(curl -ksS https://localhost:8443/health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"'

      - name: Portal is served at /
        run: curl -ksS https://localhost:8443/ | grep -q 'id="root"'

      - name: Env passthrough — a second container honours -e TENANT_ID
        run: |
          tid="22222222-2222-2222-2222-222222222222"
          docker run -d --name el-ci-env -p 9000:9000 -e PORT=9000 -e TENANT_ID="$tid" \
            -v el-ci-env-data:/app/data entra-local:ci
          for i in $(seq 1 30); do
            s=$(docker inspect --format '{{.State.Health.Status}}' el-ci-env)
            if [ "$s" = "healthy" ]; then break; fi
            sleep 2
          done
          curl -ksS https://localhost:9000/health | grep -q "\"tenantId\":\"$tid\""

      - name: Capture cert fingerprint + create an admin-API row, then stop/start the container
        run: |
          fp1=$(docker exec el-ci node -e "const{X509Certificate}=require('crypto'),fs=require('fs');console.log(new X509Certificate(fs.readFileSync('/app/data/tls/cert.pem')).fingerprint256)")
          echo "fingerprint before: $fp1"
          curl -ksS -X POST -H 'content-type: application/json' \
            -d '{"displayName":"ci-persist-marker","isConfidential":false}' \
            https://localhost:8443/admin/api/apps | grep -q 'ci-persist-marker'
          docker stop el-ci
          docker start el-ci
          for i in $(seq 1 30); do
            s=$(docker inspect --format '{{.State.Health.Status}}' el-ci)
            if [ "$s" = "healthy" ]; then break; fi
            sleep 2
          done
          fp2=$(docker exec el-ci node -e "const{X509Certificate}=require('crypto'),fs=require('fs');console.log(new X509Certificate(fs.readFileSync('/app/data/tls/cert.pem')).fingerprint256)")
          echo "fingerprint after:  $fp2"
          [ "$fp1" = "$fp2" ] || { echo "cert fingerprint changed across restart"; exit 1; }
          curl -ksS "https://localhost:8443/admin/api/apps?search=ci-persist-marker" \
            | grep -q 'ci-persist-marker'

      - name: Tear down
        if: always()
        run: |
          docker rm -f el-ci el-ci-env || true
          docker volume rm el-ci-data el-ci-env-data || true
